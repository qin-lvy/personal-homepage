<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>沁 . lvy</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #121212;
      color: #ffffff;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .intro {
      margin: 0 0 2.5rem;
      text-align: center;
      font-size: 0.95rem;
      color: #e0e0e0;
      line-height: 1.55;
    }
    .intro p {
      margin: 0;
    }
    .intro p + p {
      margin-top: 0.45rem;
    }
    .tools {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .tool-slot {
      border: 1px dashed #555;
      border-radius: 6px;
      padding: 0.85rem 1rem;
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      background-color: #1e1e1e;
    }
  </style>
</head>
<body>
  <h1>沁 . lvy</h1>
  <div class="intro">
    <p>0 → 1 indie hacker.</p>
    <p>Sharing every step of the journey.</p>
  </div>
  <div class="tools">
    <div class="tool-slot">Tool 01 · Coming soon</div>
    <div class="tool-slot">Tool 02 · Coming soon</div>
    <div class="tool-slot">Tool 03 · Coming soon</div>
    <div class="tool-slot">Tool 04 · Coming soon</div>
  </div>
</body>
</html>
