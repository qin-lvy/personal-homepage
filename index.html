<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>沁 . lvy</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #121212;
      color: #ffffff;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .intro {
      margin: 0;
      text-align: center;
      font-size: 0.95rem;
      color: #e0e0e0;
      line-height: 1.55;
    }
    .intro p {
      margin: 0;
    }
    .intro p + p {
      margin-top: 0.45rem;
    }
    .tally-subscribe {
      width: 100%;
      max-width: 360px;
      margin: 35px auto;
      text-align: center;
    }
    .tally-subscribe__title {
      margin: 0 0 0.65rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: #f5f5f5;
      letter-spacing: 0.02em;
    }
    .tally-subscribe iframe {
      display: block;
      width: 100%;
      max-width: 100%;
      border: 0;
      border-radius: 6px;
      background: transparent;
    }
    .tools {
      width: 100%;
      max-width: 360px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    @media (min-width: 601px) {
      .tools {
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
    }
    .tool-slot {
      border: 1px dashed #555;
      border-radius: 6px;
      padding: 0.85rem 1rem;
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      background-color: #1e1e1e;
    }
  </style>
</head>
<body>
  <h1>沁 . lvy</h1>
  <div class="intro">
    <p>0 → 1 indie hacker.</p>
    <p>Sharing every step of the journey.</p>
  </div>
  <div class="tally-subscribe">
    <p class="tally-subscribe__title">Get notified when tools launch</p>
    <iframe data-tally-src="https://tally.so/embed/44AGqY?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="214" frameborder="0" marginheight="0" marginwidth="0" title="Get notified when tools launch"></iframe>
  </div>
  <div class="tools">
    <div class="tool-slot">Tool 01 · Coming soon</div>
    <div class="tool-slot">Tool 02 · Coming soon</div>
    <div class="tool-slot">Tool 03 · Coming soon</div>
    <div class="tool-slot">Tool 04 · Coming soon</div>
  </div>
  <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
</body>
</html>
